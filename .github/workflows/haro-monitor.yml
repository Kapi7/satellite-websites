name: HARO Monitor

on:
  schedule:
    - cron: '0 4 * * *'   # 7:00 AM EEST
    - cron: '0 9 * * *'   # 12:00 PM EEST
    - cron: '0 14 * * *'  # 5:00 PM EEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  haro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai requests python-dotenv

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          IMAP_GLOWCODED_SERVER=imap.gmail.com
          IMAP_GLOWCODED_PASSWORD=${{ secrets.IMAP_GLOWCODED_PASSWORD }}
          IMAP_ROOTEDGLOW_SERVER=imap.gmail.com
          IMAP_ROOTEDGLOW_PASSWORD=${{ secrets.IMAP_ROOTEDGLOW_PASSWORD }}
          SMTP_GLOWCODED_SERVER=smtp.gmail.com
          SMTP_GLOWCODED_PORT=587
          SMTP_GLOWCODED_PASSWORD=${{ secrets.SMTP_GLOWCODED_PASSWORD }}
          SMTP_ROOTEDGLOW_SERVER=smtp.gmail.com
          SMTP_ROOTEDGLOW_PORT=587
          SMTP_ROOTEDGLOW_PASSWORD=${{ secrets.SMTP_ROOTEDGLOW_PASSWORD }}
          EOF

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run HARO module
        run: python3 scripts/seo/backlink_autopilot.py --module haro
        timeout-minutes: 10
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Send outreach emails
        run: python3 scripts/seo/outreach_manager.py --auto
        timeout-minutes: 5
        continue-on-error: true

      - name: Commit state files
        run: |
          git add scripts/seo/outreach_queue.json scripts/seo/outreach_log.json || true
          git diff --cached --quiet && echo "No state changes" && exit 0
          git commit -m "HARO monitor update [skip ci]"
          git pull --rebase origin main 2>/dev/null || true
          git push
