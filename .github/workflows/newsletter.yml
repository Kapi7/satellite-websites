name: Friday Newsletter

on:
  schedule:
    - cron: '0 11 * * 5'  # Friday 14:00 EEST (UTC+3)
  workflow_dispatch:
    inputs:
      edition:
        description: 'Force specific edition number (1-10), leave empty for auto'
        required: false
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Resolve Cloudflare KV token
        id: cf_token
        env:
          CF_API_TOKEN: ${{ secrets.CF_KV_API_TOKEN }}
          CF_REFRESH_TOKEN: ${{ secrets.CF_OAUTH_REFRESH_TOKEN }}
        run: |
          set +e
          # Prefer direct API token if available (simplest, permanent).
          if [ -n "$CF_API_TOKEN" ]; then
            echo "Using direct CF_KV_API_TOKEN secret."
            echo "::add-mask::$CF_API_TOKEN"
            echo "token=$CF_API_TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fallback: OAuth refresh flow (legacy).
          echo "No CF_KV_API_TOKEN secret set; falling back to OAuth refresh flow."
          RESPONSE=$(curl -sS -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=$CF_REFRESH_TOKEN" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          CURL_RC=$?
          echo "curl exit=$CURL_RC"
          printf '%s' "$RESPONSE" | python3 -c "
          import json, sys
          try:
              d = json.loads(sys.stdin.read())
              for k in ('access_token', 'refresh_token', 'id_token'):
                  if k in d:
                      d[k] = '<REDACTED len=' + str(len(d[k])) + '>'
              print('Response:', json.dumps(d))
          except Exception as e:
              print('JSON parse failed:', e)
          " || true
          ACCESS_TOKEN=$(printf '%s' "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to obtain Cloudflare token. Set CF_KV_API_TOKEN secret (Account > Workers KV Storage > Read) or refresh CF_OAUTH_REFRESH_TOKEN."
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Send newsletter
        run: |
          ARGS=""
          if [ -n "$EDITION_NUM" ]; then
            ARGS="--edition $EDITION_NUM"
          fi
          python3 scripts/newsletters/send_weekly.py $ARGS
        env:
          EDITION_NUM: ${{ inputs.edition }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_API_TOKEN: ${{ steps.cf_token.outputs.token }}
          CF_KV_NAMESPACE_GLOWCODED: ${{ secrets.CF_KV_NAMESPACE_GLOWCODED }}
          CF_KV_NAMESPACE_ROOTEDGLOW: ${{ secrets.CF_KV_NAMESPACE_ROOTEDGLOW }}
          CF_KV_NAMESPACE_BUILDCODED: ${{ secrets.CF_KV_NAMESPACE_BUILDCODED }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
          SMTP_GLOWCODED_SERVER: ${{ secrets.SMTP_GLOWCODED_SERVER }}
          SMTP_GLOWCODED_PORT: ${{ secrets.SMTP_GLOWCODED_PORT }}
          SMTP_GLOWCODED_PASSWORD: ${{ secrets.SMTP_GLOWCODED_PASSWORD }}
          OUTREACH_GLOWCODED_EMAIL: ${{ secrets.OUTREACH_GLOWCODED_EMAIL }}
          SMTP_ROOTEDGLOW_SERVER: ${{ secrets.SMTP_ROOTEDGLOW_SERVER }}
          SMTP_ROOTEDGLOW_PORT: ${{ secrets.SMTP_ROOTEDGLOW_PORT }}
          SMTP_ROOTEDGLOW_PASSWORD: ${{ secrets.SMTP_ROOTEDGLOW_PASSWORD }}
          OUTREACH_ROOTEDGLOW_EMAIL: ${{ secrets.OUTREACH_ROOTEDGLOW_EMAIL }}
          SMTP_BUILDCODED_SERVER: ${{ secrets.SMTP_BUILDCODED_SERVER }}
          SMTP_BUILDCODED_PORT: ${{ secrets.SMTP_BUILDCODED_PORT }}
          SMTP_BUILDCODED_PASSWORD: ${{ secrets.SMTP_BUILDCODED_PASSWORD }}
          OUTREACH_BUILDCODED_EMAIL: ${{ secrets.OUTREACH_BUILDCODED_EMAIL }}
